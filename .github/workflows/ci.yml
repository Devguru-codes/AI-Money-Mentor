name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx
        
    - name: Test Unit Math Layers
      run: |
        cd backend
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python tests/test_karvid.py
        python tests/test_yojana.py
        
    - name: FastAPI E2E Spinup Test
      run: |
        cd backend
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        # Start server in background
        uvicorn api_server:app --port 8000 &
        sleep 5
        # We run the deep integration test against the simulated cluster
        python tests/deep_agent_test.py
        python tests/greeting_test.py

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        
    - name: Install Dependencies
      run: |
        cd frontend
        npm install
        npx prisma generate
        
    - name: Run Jest API Route Tests
      run: |
        cd frontend
        npm run test
